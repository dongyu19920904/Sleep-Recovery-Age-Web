params:
  la51Id: "3OeesViIrmuFMAz4"
  description: 输入 7 天可穿戴设备和睡眠习惯数据，生成睡眠恢复分、恢复年龄画像、薄弱项和 7 天行动报告。工具只做健康数据观察，不提供医疗诊断或治疗建议。
